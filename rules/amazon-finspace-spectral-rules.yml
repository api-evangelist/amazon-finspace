# Amazon FinSpace Spectral Rules
# Enforces API conventions for the Amazon FinSpace REST API

extends: spectral:oas

rules:

  finspace-info-contact:
    description: API must have contact information in info block
    message: "Info object must include contact details"
    severity: warn
    given: "$.info"
    then:
      field: contact
      function: truthy

  finspace-info-description:
    description: API must have a description
    severity: error
    given: "$.info"
    then:
      field: description
      function: truthy

  finspace-info-version:
    description: API info must include version
    severity: error
    given: "$.info"
    then:
      field: version
      function: truthy

  finspace-servers-defined:
    description: Servers must be defined
    severity: error
    given: "$"
    then:
      field: servers
      function: truthy

  finspace-server-https:
    description: All server URLs must use HTTPS
    message: "Server URL '{{value}}' must use HTTPS"
    severity: error
    given: "$.servers[*].url"
    then:
      function: pattern
      functionOptions:
        match: "^https://"

  finspace-operation-summary:
    description: Operations must have a summary
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: summary
      function: truthy

  finspace-operation-description:
    description: Operations should have a description
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: description
      function: truthy

  finspace-operation-tags:
    description: Operations must have at least one tag
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: tags
      function: truthy

  finspace-operation-id:
    description: Operations must have operationId
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: operationId
      function: truthy

  finspace-operation-id-camel-case:
    description: operationId should use camelCase
    message: "operationId '{{value}}' should use camelCase"
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete].operationId"
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"

  finspace-request-body-content:
    description: Request bodies must define content
    severity: error
    given: "$.paths[*][post,put,patch].requestBody"
    then:
      field: content
      function: truthy

  finspace-request-body-json:
    description: Request bodies should support application/json
    severity: warn
    given: "$.paths[*][post,put,patch].requestBody.content"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: ["application/json"]

  finspace-response-200:
    description: GET, POST operations should define 200 response
    severity: warn
    given: "$.paths[*][get,post]"
    then:
      field: responses.200
      function: truthy

  finspace-response-400:
    description: Operations should define 400 response for bad requests
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: responses.400
      function: truthy

  finspace-response-404:
    description: Operations accessing a resource by ID should define 404
    severity: warn
    given: "$.paths[*~'\{[^}]+\}'][get,put,patch,delete].responses"
    then:
      field: "404"
      function: truthy

  finspace-response-500:
    description: Operations should define 500 response for server errors
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: responses.500
      function: truthy

  finspace-parameter-description:
    description: Parameters must have descriptions
    severity: error
    given: "$.paths[*][get,post,put,patch,delete].parameters[*]"
    then:
      field: description
      function: truthy

  finspace-path-param-required:
    description: Path parameters must be marked as required
    severity: error
    given: "$.paths[*][get,post,put,patch,delete].parameters[?(@.in=='path')]"
    then:
      field: required
      function: truthy

  finspace-schema-description:
    description: Schema components should have descriptions
    severity: warn
    given: "$.components.schemas[*]"
    then:
      field: description
      function: truthy

  finspace-schema-properties:
    description: Object schemas should define properties
    severity: warn
    given: "$.components.schemas[?(@.type=='object')]"
    then:
      field: properties
      function: truthy

  finspace-error-schema:
    description: Error responses should reference a consistent error schema
    severity: warn
    given: "$.paths[*][*].responses[4xx,5xx].content.application/json.schema"
    then:
      field: "$ref"
      function: truthy

  finspace-resource-id-suffix:
    description: Resource identifier paths should end with Id or Name
    message: "Resource identifier parameter '{{value}}' should end with 'Id' or 'Name'"
    severity: info
    given: "$.paths[*][get,put,patch,delete].parameters[?(@.in=='path')].name"
    then:
      function: pattern
      functionOptions:
        match: "(Id|Name|Arn)$"

  finspace-tags-title-case:
    description: Operation tags should use Title Case
    message: "Tag '{{value}}' should use Title Case"
    severity: warn
    given: "$.paths[*][*].tags[*]"
    then:
      function: pattern
      functionOptions:
        match: "^[A-Z][a-zA-Z0-9 ]*$"

  finspace-list-operation-prefix:
    description: Collection GET operations should use 'list' prefix in operationId
    message: "Collection GET '{{path}}' operationId should start with 'list'"
    severity: warn
    given: "$.paths[*~'[^}]$'].get.operationId"
    then:
      function: pattern
      functionOptions:
        match: "^list"

  finspace-create-operation-prefix:
    description: POST operations should use 'create' prefix in operationId
    message: "POST operationId '{{value}}' should start with 'create'"
    severity: warn
    given: "$.paths[*].post.operationId"
    then:
      function: pattern
      functionOptions:
        match: "^create"

  finspace-delete-returns-204:
    description: DELETE operations should return 204 No Content
    severity: info
    given: "$.paths[*].delete"
    then:
      field: responses.204
      function: truthy
