aid: amazon-finspace
name: Amazon FinSpace
description: >-
  Amazon FinSpace is a data management and analytics service built specifically
  for the financial services industry. It reduces the time you spend on
  time-consuming data preparation tasks and makes it easy for analysts to access
  and analyze petabytes of financial data with a few clicks.
